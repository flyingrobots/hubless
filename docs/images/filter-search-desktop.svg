<svg width="960" height="540" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg">
  <style>
    .canvas { fill: #ffffff; stroke: #1f2933; stroke-width: 2; }
    .statusline { fill: #f5f7fa; stroke: #cbd2d9; stroke-width: 1.5; }
    .body { fill: #f0f4f8; stroke: #cbd2d9; stroke-width: 1; }
    .overlay { fill: #ffffff; stroke: #334e68; stroke-width: 2; }
    .label { font-family: 'Arial', sans-serif; font-size: 16px; fill: #102a43; font-weight: bold; }
    .sublabel { font-family: 'Arial', sans-serif; font-size: 13px; fill: #243b53; }
  </style>
  <rect class="canvas" x="4" y="4" width="952" height="532" rx="8" />
  <rect class="statusline" x="20" y="20" width="920" height="60" rx="8" />
  <text class="label" x="40" y="56">Statusline</text>
  <rect class="body" x="20" y="100" width="920" height="320" rx="12" />
  <text class="label" x="40" y="134">Underlying buffer (e.g., status)</text>
  <rect class="overlay" x="20" y="440" width="920" height="80" rx="18" />
  <text class="label" x="40" y="476">Filter Bar</text>
  <rect class="overlay" x="40" y="484" width="800" height="36" rx="12" fill="#f0f4f8" stroke="#d9e2ec" />
  <text class="sublabel" x="60" y="508">status:open assignee:me priority:high</text>
  <text class="sublabel" x="860" y="508">/</text>
</svg>
