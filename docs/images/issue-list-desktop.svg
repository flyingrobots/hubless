<svg width="960" height="540" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg">
  <style>
    .canvas { fill: #ffffff; stroke: #1f2933; stroke-width: 2; }
    .region { fill: #f8fafc; stroke: #d2d6dc; stroke-width: 1.5; }
    .pane { fill: #e4ebf5; stroke: #7b8794; stroke-width: 1; stroke-dasharray: 6 4; }
    .label { font-family: 'Arial', sans-serif; font-size: 16px; fill: #0b1f33; font-weight: bold; }
    .sublabel { font-family: 'Arial', sans-serif; font-size: 13px; fill: #2d3a4a; }
  </style>
  <rect class="canvas" x="4" y="4" width="952" height="532" rx="8" />

  <rect class="region" x="20" y="20" width="920" height="60" rx="8" />
  <text class="label" x="40" y="56">Statusline</text>

  <rect class="region" x="20" y="100" width="920" height="380" rx="12" />
  <text class="label" x="40" y="134">Issue List Focus · Stickers split (sidebar + preview)</text>

  <rect class="pane" x="40" y="160" width="340" height="300" rx="10" />
  <text class="sublabel" x="60" y="190">List · grouped by status</text>
  <text class="sublabel" x="60" y="220">• multi-select ticks</text>
  <text class="sublabel" x="60" y="250">• keyboard focus rail</text>

  <rect class="pane" x="400" y="160" width="520" height="300" rx="10" />
  <text class="sublabel" x="420" y="190">Preview viewport</text>
  <text class="sublabel" x="420" y="220">• markdown summary</text>
  <text class="sublabel" x="420" y="250">• secondary metadata strip</text>

  <rect class="region" x="20" y="500" width="920" height="32" rx="8" />
  <text class="label" x="40" y="523">Footer · hints · background sync</text>
</svg>
