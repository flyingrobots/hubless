run:
  timeout: 5m
  tests: true
linters:
  enable:
    - govet
    - staticcheck
    - gofmt
    - goimports
    - revive
    - errcheck
    - ineffassign
    - gosec
issues:
  exclude-use-default: false

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/flyingrobots/hubless
  revive:
    ignore-generated-header: true
