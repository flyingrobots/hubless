version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - revive
  exclusions:
    generated: strict
  settings:
    revive:
      severity: warning

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/flyingrobots/hubless
