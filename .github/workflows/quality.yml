name: Quality Checks

on:
  push:
    branches: [ main, docs-release-pipeline ]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.56.2

      - name: gofmt check
        run: make fmt-check

      - name: Run golangci-lint
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          make lint

      - name: Go tests
        run: make test
