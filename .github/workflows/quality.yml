name: Quality Checks

on:
  push:
    branches: [main, docs-release-pipeline]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install markdown-transclusion
        run: npm install -g markdown-transclusion

      - name: gofmt check
        run: make fmt-check

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: v1.60.2
          install-mode: binary
          args: ./...
      - name: Go vet
        run: make vet

      - name: Go tests
        run: make test

      - name: Generate docs
        run: make docs

      - name: Verify docs
        run: make docs-verify

      - name: Ensure docs committed
        run: |
          git status --porcelain
          git diff --stat
          git diff --exit-code
