name: Quality Checks

on:
  push:
    branches: [ main, docs-release-pipeline ]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: gofmt check
        run: make fmt-check

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: v1.59.1
          args: ./...

      - name: Go tests
        run: make test
